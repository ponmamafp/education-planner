<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fafaf8;-webkit-text-size-adjust:100%;overflow-x:hidden}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer;background:#d1cdc7}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:#d1cdc7}
input[type=range]::-moz-range-track{height:6px;border-radius:3px;background:#d1cdc7;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:#1c1917;cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2);margin-top:-8px}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#1c1917;cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2)}
table{border-collapse:collapse}
@media(max-width:600px){
  .chart-row{grid-template-columns:1fr !important}
  .stage-grid{grid-template-columns:repeat(2,1fr) !important}
  .slider-grid{grid-template-columns:1fr !important}
  .summary-cards{grid-template-columns:1fr 1fr !important}
}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,LineChart,Line,CartesianGrid,ReferenceLine}=Recharts;

const STAGES=[
  {id:"nursery",   label:"幼稚園",icon:"幼",ages:"3〜5歳",  years:3,pub:185000, pri:347000 },
  {id:"elementary",label:"小学校",icon:"小",ages:"6〜11歳", years:6,pub:336000, pri:1828000},
  {id:"middle",    label:"中学校",icon:"中",ages:"12〜14歳",years:3,pub:542000, pri:1560000},
  {id:"high",      label:"高校",  icon:"高",ages:"15〜17歳",years:3,pub:598000, pri:1030000},
  {id:"uni",       label:"大学",  icon:"大",ages:"18〜21歳",years:4,pub:540000, pri:1020000,
    priTypes:{liberal:{label:"私立文系",cost:1020000,years:4},science:{label:"私立理系",cost:1380000,years:4}}},
];
const SHIOKURI_MONTHLY=72000;
const COLORS=["#2563eb","#d97706","#059669","#dc2626","#7c3aed"];
const SUPPORTS=[
  {tag:"返還不要",  color:"#5a7a3a",name:"高等教育の修学支援新制度（JASSO）",  body:"低〜中間所得層の大学授業料減免＋返還不要の給付奨学金。多子世帯・理工農系も対象拡大中。詳細・金額は公式サイトで。",              url:"https://www.jasso.go.jp/shogakukin/about/kyufu/index.html"},
  {tag:"返還不要",  color:"#5a7a3a",name:"多子世帯の大学等無償化（2025年4月〜）",   body:"子ども3人以上を同時に扶養する世帯が対象（所得制限なし）。同時扶養が2人以下になると対象外。JASSO申請必須。詳細・金額は公式サイトで。",               url:"https://www.mext.go.jp/kyufu/"},
  {tag:"2026年4月〜",color:"#5d3954",name:"高等学校等就学支援金",              body:"高校の授業料を国が支援する制度。2026年4月から所得制限が完全撤廃。公立は実質無償、私立も拡充。詳細・金額は公式サイトで。",  url:"https://www.mext.go.jp/a_menu/shotou/mushouka/1342674.htm"},
  {tag:"3〜5歳無償",color:"#5d3954",name:"幼児教育・保育の無償化",            body:"3〜5歳の保育料が原則無償。0〜2歳は住民税非課税世帯のみ対象。詳細・要件は公式サイトで。",              url:"https://www8.cao.go.jp/shoushi/shinseido/musyouka/index.html"},
  {tag:"月1〜3万円",color:"#b87333",name:"児童手当（2024年10月〜拡充済）",     body:"0歳〜高校生年代まで毎月支給。所得制限撤廃・支給対象が高校生まで延長・第3子以降は増額。詳細・金額は公式サイトで。",                url:"https://www.cfa.go.jp/policies/kokoseido/jidouteate/annai/"},
  {tag:"無利子",    color:"#1e3a5f",name:"第一種奨学金（JASSO）",             body:"無利子の貸与型奨学金。学力・家計の基準あり。詳細は公式サイトで。",                   url:"https://www.jasso.go.jp/shogakukin/about/taiyo/index.html"},
  {tag:"有利子",    color:"#1e3a5f",name:"第二種奨学金（JASSO）",             body:"有利子の貸与型奨学金。第一種より採用基準が緩やか。詳細は公式サイトで。",                 url:"https://www.jasso.go.jp/shogakukin/about/taiyo/index.html"},
  {tag:"低金利",    color:"#a83a2c",name:"国の教育ローン（日本政策金融公庫）",body:"日本政策金融公庫の低金利ローン。詳細・要件は公式サイトで。",                        url:"https://www.jfc.go.jp/n/finance/search/ippan.html"},
  {tag:"無料ツール",color:"#374151",name:"進学資金シミュレーター（JASSO）",   body:"JASSOの公式シミュレーター。給付型奨学金の対象かどうかの目安が確認できます。",           url:"https://simulation.jasso.go.jp/shingaku/"},
  {tag:"2026年4月開始",color:"#5a7a3a",name:"公立小学校 給食費の実質無償化",         body:"公立小学校の給食費を国が支援（2026年4月開始済）。私立小・中学校は対象外。詳細・金額は公式サイトで。",    url:"https://www.mext.go.jp/a_menu/sports/syokuiku/kyu-lighten.html"},
  {tag:"住民税非課税",color:"#5d3954",name:"高校生等奨学給付金",                body:"住民税非課税世帯の高校生に、教科書・通学費など「授業料以外」の費用を給付。高校無償化（授業料）と併用可。詳細は公式サイトで。",    url:"https://www.mext.go.jp/a_menu/shotou/mushouka/1409384.htm"},
];

const getAge=(by)=>{
  if(by===null||by===undefined)return 0;
  const now=new Date();
  const schoolYear=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;
  return schoolYear-by;
};
const fmt=n=>new Intl.NumberFormat("ja-JP",{style:"currency",currency:"JPY",maximumFractionDigits:0}).format(n);
const man=n=>`${Math.round(n/10000)}万`;
const annualCost=(child,sid)=>{
  const stage=STAGES.find(s=>s.id===sid);
  if(sid==="uni"&&child.sel[sid]!=="pub"){
    const t=child.sel[sid];
    const pt=stage.priTypes[typeof t==="object"?t.type||"liberal":t]||stage.priTypes.liberal;
    return pt.cost;
  }
  return child.sel[sid]==="pri"?stage.pri:stage.pub;
};
const uniYears=child=>{
  const stage=STAGES.find(s=>s.id==="uni");
  const sel=child.sel["uni"];
  if(sel==="pub"||sel==="pri")return 4;
  const t=typeof sel==="object"?sel.type||"liberal":sel;
  return stage.priTypes[t]?.years||4;
};
const uniTotal=child=>{
  const stage=STAGES.find(s=>s.id==="uni");
  const sel=child.sel["uni"];
  let years=4;
  if(sel!=="pub"&&sel!=="pri"){
    const t=typeof sel==="object"?sel.type||"liberal":sel;
    years=stage.priTypes[t]?.years||4;
  }
  return annualCost(child,"uni")*years;
};
function stageAtAge(age){
  if(age<3)return null;if(age<6)return STAGES[0];if(age<12)return STAGES[1];
  if(age<15)return STAGES[2];if(age<18)return STAGES[3];if(age<22)return STAGES[4];
  return null;
}
function monthlySchool(child,age){const s=stageAtAge(age);return s?Math.round(annualCost(child,s.id)/12):0;}
function fv(p,m,r,y){if(y<=0)return p;if(r===0)return p+m*12*y;const rm=r/100/12,n=y*12;return Math.round(p*Math.pow(1+rm,n)+m*((Math.pow(1+rm,n)-1)/rm));}
function needM(p,t,r,y){if(y<=0)return 0;if(r===0)return Math.ceil(Math.max(0,t-p)/(y*12));const rm=r/100/12,n=y*12;return Math.ceil(Math.max(0,(t-p*Math.pow(1+rm,n))/((Math.pow(1+rm,n)-1)/rm)));}

const card={background:"#fff",borderRadius:16,boxShadow:"0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04)",overflow:"hidden"};
const cinput={width:"100%",border:"1.5px solid #e5e0d8",borderRadius:8,padding:"10px 12px",fontSize:14,background:"white"};
const clbl={fontSize:11,fontWeight:700,color:"#78716c",letterSpacing:".04em"};
const STORAGE_KEY="edu-planner-v1";

function App(){
  const [children,setChildren]=useState(()=>{
    try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):[];}catch{return[];}
  });
  const [adding,setAdding]=useState(false);
  const [drawer,setDrawer]=useState(null);
  const resultRefs=useRef({});

  useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(children));}catch{}},[children]);

  const addChild=(name,birthYear)=>{
    const id=Date.now();
    setChildren(p=>[...p,{id,name,birthYear,color:COLORS[p.length%COLORS.length],
      sel:{nursery:"pub",elementary:"pub",middle:"pub",high:"pub",uni:"pub"},
      saved:0,monthly:10000,rate:3,shiokuri:false}]);
    setAdding(false);
    setTimeout(()=>resultRefs.current[id]?.scrollIntoView({behavior:"smooth",block:"start"}),200);
  };
  const upd=(id,patch)=>setChildren(p=>p.map(c=>c.id===id?{...c,...patch}:c));
  const del=id=>setChildren(p=>p.filter(c=>c.id!==id));

  return(
    <div style={{fontFamily:"'BIZ UDPMincho','Hiragino Mincho ProN','Yu Mincho',serif",background:"#fafaf8",minHeight:"100vh",color:"#1c1917",paddingBottom:children.length?80:0}}>
      <div style={{background:"#1c1917",color:"white",padding:"20px 16px 16px"}}>
        <div style={{maxWidth:780,margin:"0 auto"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:".14em",color:"#a8a29e",marginBottom:5,fontFamily:"'DM Sans',sans-serif"}}>EDUCATION COST PLANNER</div>
          <h1 style={{margin:0,fontSize:22,fontWeight:800}}>教育費プランナー</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:"#d6d3d1",lineHeight:1.7}}>子どもの年齢と進路を入力するだけ。毎月の費用と積み立て計画がすぐわかります。</p>
          <div style={{margin:"12px 0 0",display:"flex",gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:11,color:"#d6d3d1",background:"rgba(255,255,255,.08)",borderRadius:10,padding:"6px 12px",lineHeight:1.7}}>
              <span style={{color:"#6ee7b7",fontWeight:700}}>○ 含む</span>　授業料・給食費・塾・習い事の平均
            </div>
            <div style={{fontSize:11,color:"#d6d3d1",background:"rgba(255,255,255,.08)",borderRadius:10,padding:"6px 12px",lineHeight:1.7}}>
              <span style={{color:"#fca5a5",fontWeight:700}}>× 含まない</span>　入学金・制服・教材などの一時費用・大学生活費・受験費用
            </div>
            <div style={{fontSize:11,color:"#fef3c7",background:"rgba(251,191,36,.18)",borderRadius:10,padding:"6px 12px",lineHeight:1.7}}>
              <span style={{color:"#fde68a",fontWeight:700}}>※ 注意</span>　無償化制度（幼保・高校就学支援金・給食費等）は反映していません。実負担はこれより少なくなります
            </div>
          </div>
        </div>
      </div>
      <div style={{maxWidth:780,margin:"0 auto",padding:"16px 16px 24px",display:"grid",gap:16}}>
        {!children.length&&!adding&&(
          <div style={{textAlign:"center",padding:"72px 24px 56px"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:14,letterSpacing:".04em",lineHeight:1.5,color:"#1c1917"}}>お子さまの情報を<br/>入力してください</div>
            <div style={{fontSize:13,color:"#57534e",marginBottom:36,lineHeight:1.9}}>年齢と進路（公立・私立）を選ぶだけで<br/>毎月いくら必要かがすぐにわかります</div>
            <button onClick={()=>setAdding(true)} style={{padding:"15px 48px",background:"#b87333",color:"white",border:"none",borderRadius:99,fontWeight:800,fontSize:15,cursor:"pointer",letterSpacing:".08em",boxShadow:"0 2px 8px rgba(184,115,51,.25)"}}>お子さまを追加</button>
          </div>
        )}
        {adding&&!children.length&&<AddForm color={COLORS[0]} onAdd={addChild} onCancel={()=>setAdding(false)}/>}
        {children.map(c=>(
          <div key={c.id} ref={el=>resultRefs.current[c.id]=el}>
            <ChildSection child={c} upd={upd} onDelete={()=>del(c.id)} onOpenSupport={()=>setDrawer("support")}/>
          </div>
        ))}
        {!!children.length&&!adding&&(
          <button onClick={()=>setAdding(true)} style={{padding:"16px",background:"white",border:"1.5px dashed #c8cdd2",borderRadius:10,cursor:"pointer",color:"#78716c",fontSize:14,fontWeight:700,letterSpacing:".05em"}}>＋ もう一人追加する</button>
        )}
        {children.length>0&&(()=>{
          const allTotal=children.reduce((sum,c)=>{
            const age=getAge(c.birthYear);
            let total=0;
            let counting=false;
            const stageNow=stageAtAge(age);
            for(const s of STAGES){
              if(s.id===stageNow?.id){
                const yearsLeft=s.id==="nursery"?Math.max(6-age,0):
                                s.id==="elementary"?Math.max(12-age,0):
                                s.id==="middle"?Math.max(15-age,0):
                                s.id==="high"?Math.max(18-age,0):
                                Math.max(22-age,0);
                total+=annualCost(c,s.id)*yearsLeft;
                counting=true;
              } else if(counting){
                const yrs=s.id==="uni"?uniYears(c):s.years;
                total+=annualCost(c,s.id)*yrs;
              }
            }
            if(!stageNow)total=STAGES.reduce((t,s)=>t+annualCost(c,s.id)*(s.id==="uni"?uniYears(c):s.years),0);
            return sum+total;
          },0);
          return(
            <div>
              <div style={{background:"#f0ece6",borderRadius:16,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid #d6d0c8"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#78716c",marginBottom:2}}>🎓 子ども全員の残り総学費</div>
                  <div style={{fontSize:10,color:"#78716c"}}>学費合計（積立・入学一時費用は含まず）</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:28,fontWeight:800,color:"#1c1917",lineHeight:1}}>{man(allTotal)}円</div>
                  {children.length>1&&<div style={{fontSize:10,color:"#a8a29e",marginTop:2}}>{children.length}人分の合計</div>}
                </div>
              </div>
              {children.length>1&&(<>
                <button onClick={()=>{
                  let allMonthly=0;
                  children.forEach(c=>{
                    const a=getAge(c.birthYear);
                    const st=stageAtAge(a);
                    const sm=st?Math.round(annualCost(c,st.id)/12):0;
                    const skm=(c.shiokuri&&a>=18&&a<22)?SHIOKURI_MONTHLY:0;
                    allMonthly+=c.monthly+sm+skm;
                  });
                  const t=new Date();
                  const ymd=`${t.getFullYear()}年${t.getMonth()+1}月時点`;
                  let text=`【うちの教育費プラン（${children.length}人）／${ymd}】\n\n`;
                  text+=`▼子ども全員の残り総学費：${man(allTotal)}円\n`;
                  text+=`▼今月の教育費合計：${fmt(allMonthly)}\n`;
                  text+=`──────`;
                  children.forEach(c=>{
                    const a=getAge(c.birthYear);
                    const yrs=Math.max(18-a,0);
                    const tgt=uniTotal(c)+(c.shiokuri?SHIOKURI_MONTHLY*12*4:0);
                    const pj=fv(c.saved,c.monthly,c.rate,yrs);
                    const okk=pj>=tgt;
                    const nd=needM(c.saved,tgt,c.rate,yrs);
                    const st=stageAtAge(a);
                    const sm=st?Math.round(annualCost(c,st.id)/12):0;
                    const skm=(c.shiokuri&&a>=18&&a<22)?SHIOKURI_MONTHLY:0;
                    const tm=c.monthly+sm+skm;
                    const uS=c.sel.uni;
                    const uL=uS==="pub"?"国公立":(STAGES[4].priTypes[uS]?.label||"私立");
                    text+=`\n\n【${c.name}（${a<0?"妊娠中":a+"歳"}）】\n`;
                    text+=`今月の教育費：${fmt(tm)}\n`;
                    text+=`進路：幼${c.sel.nursery==="pri"?"私":"公"} → 小${c.sel.elementary==="pri"?"私":"公"} → 中${c.sel.middle==="pri"?"私":"公"} → 高${c.sel.high==="pri"?"私":"公"} → 大${uL}\n`;
                    text+=`大学積立：目標${man(tgt)}円/予測${man(pj)}円 ${okk?"✅達成見込み":`⚠️${man(tgt-pj)}円不足（月${fmt(nd)}で達成）`}`;
                  });
                  const today=new Date();
                  text+=`\n\n▼次にやること\n　□ 学資保険・他の積立の証券を夫婦で確認する\n　□ JASSO進学資金シミュレーターで給付奨学金の対象か確認（5分）\n　□ NISAつみたて投資枠を確認する（まだの人は「NISAって何？」を5分調べる、でOK）`;
                  text+=`\n\n教育費プランナー（出力日：${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}）`;
                  navigator.clipboard.writeText(text).then(()=>{
                    alert("家族全員の結果をコピーしました！\nLINE・メールに貼り付けて夫婦で共有できます");
                  }).catch(()=>{
                    alert("コピーに失敗しました");
                  });
                }} style={{width:"100%",marginTop:10,padding:"13px 12px",background:"#1c1917",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,letterSpacing:".05em"}}>
                  📋 家族全員の結果をコピー
                </button>
                <div style={{fontSize:10,color:"#a8a29e",textAlign:"center",marginTop:4}}>全員分まとめて夫婦・LINEで共有するときはこちら</div>
              </>)}
            </div>
          );
        })()}
        {!!children.length&&adding&&<AddForm color={COLORS[children.length%COLORS.length]} onAdd={addChild} onCancel={()=>setAdding(false)}/>}
      </div>
      {!!children.length&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fafaf8",borderTop:"1px solid #e5e0d8",zIndex:100,padding:"10px 12px 14px"}}>
          <div style={{maxWidth:780,margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {id:"plan",   label:"年次プラン",sub:"年ごとの学費を見る",       color:"#1e3a5f"},
              {id:"support",label:"支援制度",  sub:"奨学金・無償化を見る",     color:"#5a7a3a"},
            ].map(t=>{
              const active=drawer===t.id;
              return(
                <button key={t.id} onClick={()=>setDrawer(d=>d===t.id?null:t.id)}
                  style={{padding:"14px 16px",border:`1.5px solid ${active?t.color:"#e5e0d8"}`,background:active?t.color:"white",borderRadius:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,boxShadow:active?`0 3px 10px ${t.color}33`:"0 1px 3px rgba(0,0,0,.06)",transition:"all .15s",minHeight:60}}>
                  <div style={{textAlign:"left",flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:800,color:active?"white":"#1c1917",lineHeight:1.2}}>{t.label}</div>
                    <div style={{fontSize:11,color:active?"rgba(255,255,255,.85)":"#78716c",marginTop:3,lineHeight:1.4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.sub}</div>
                  </div>
                  <span style={{fontSize:18,color:active?"white":t.color,fontWeight:600,flexShrink:0,marginLeft:4}}>{active?"×":"↗"}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}
      {/* drawer==="summary"&&<Drawer title="📊 家族全体サマリー" onClose={()=>setDrawer(null)}><FamilySummary children={children}/></Drawer> */}
      {drawer==="plan"   &&<Drawer title="年次プラン"       onClose={()=>setDrawer(null)}><YearlyPlan children={children}/></Drawer>}
      {drawer==="support"&&<Drawer title="支援制度・奨学金" onClose={()=>setDrawer(null)}><SupportList/></Drawer>}
      <Disclaimer/>
    </div>
  );
}

function AddForm({color,onAdd,onCancel}){
  const [name,setName]=useState("");
  const [age,setAge]=useState(6);
  const AGE_OFFSET=-1; // インデックス0=妊娠中(-1歳)
  const now=new Date();
  const schoolYear=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;
  // 4/1以降：「20XX年度生まれ（学年）」表記
  const gradeLabels=["年少","年中","年長","小1","小2","小3","小4","小5","小6","中1","中2","中3","高1","高2","高3","大1","大2","大3","大4"];
  const isBeforeApril=now.getMonth()<3; // 1〜3月はまだ進級前
  const makeLabel=(realAge)=>{
    if(realAge<0) return <span>妊娠中（〜1年後に誕生）</span>;
    const gradeIdx=realAge-(isBeforeApril?4:3);
    if(gradeIdx<0) return <span>{realAge}歳</span>;
    // 学年から逆算した生まれ年度（年少=2022年度、年中=2021年度…）
    const birthSchoolYear=schoolYear-gradeIdx-4;
    const nextYear=birthSchoolYear+1;
    const grade=gradeLabels[Math.min(gradeIdx,gradeLabels.length-1)]||"";
    return (<>
      <div>{birthSchoolYear}年度生まれ</div>
      <div style={{fontSize:11,fontWeight:500,color:"#78716c",lineHeight:1.3,marginTop:1}}>（{birthSchoolYear}/4〜{nextYear}/3）</div>
      <div style={{marginTop:1}}>{grade}</div>
    </>);
  };
  const AGE_LABELS=Array.from({length:24},(_,i)=>makeLabel(i+AGE_OFFSET));
  const realAge=age+(typeof AGE_OFFSET!=="undefined"?AGE_OFFSET:3);
  const birthYear=schoolYear-realAge;
  const stageNow=stageAtAge(realAge);
  return(
    <div style={{...card,padding:"16px",borderTop:`3px solid ${color}`}}>
      <div style={{marginBottom:18,paddingBottom:10,borderBottom:"1px solid #e5e0d8"}}>
        <div style={{fontSize:9,fontWeight:700,color:"#a8a29e",letterSpacing:".14em",marginBottom:3}}>NEW CHILD</div>
        <div style={{fontWeight:800,fontSize:15,color:"#1c1917"}}>お子さまの情報</div>
      </div>
      <div style={{display:"grid",gap:18,marginBottom:22}}>
        <div>
          <div style={{...clbl,fontSize:12,marginBottom:7}}>お名前（ニックネームでOK）</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="例：たろう" style={cinput} autoFocus/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10,gap:8}}>
            <span style={{...clbl,fontSize:12}}>今の年齢</span>
            <div style={{fontSize:14,fontWeight:800,color,lineHeight:1.4,textAlign:"right"}}>{AGE_LABELS[age]}</div>
          </div>
          <input type="range" min={0} max={22} step={1} value={age}
            onChange={e=>setAge(+e.target.value)}
            style={{width:"100%",accentColor:color,cursor:"pointer"}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#a8a29e",marginTop:6,overflow:"hidden"}}>
            <span>妊娠中</span><span>幼稚園</span><span>小学校</span><span>中学</span><span>高校</span><span>大学</span><span>21歳</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={{padding:"10px 16px",background:"#f5f5f4",border:"none",borderRadius:6,fontWeight:600,cursor:"pointer",color:"#44403c",fontSize:13,whiteSpace:"nowrap"}}>キャンセル</button>
        <button onClick={()=>{if(name.trim())onAdd(name.trim(),birthYear)}}
          style={{padding:"10px 22px",background:name.trim()?"#1c1917":"#d6d3d1",color:"white",border:"none",borderRadius:6,fontWeight:700,fontSize:13,cursor:name.trim()?"pointer":"default",whiteSpace:"nowrap"}}>
          結果を見る
        </button>
      </div>
    </div>
  );
}

        <div style={{position:"sticky",top:0,background:"white",padding:"14px 16px 12px",borderBottom:"1px solid #f5f5f4",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        <div style={{padding:"12px 14px 80px"}}>{children}</div>
      </div>
    </div>
  );
}

  const childTarget=c=>uniTotal(c)+(c.shiokuri?SHIOKURI_MONTHLY*12*4:0);
  const childNeed=c=>needM(c.saved,childTarget(c),c.rate,Math.max(18-getAge(c.birthYear),0));
  const calcTotal=c=>{
    const age=getAge(c.birthYear);
    let total=0;
    for(let a=age;a<22;a++){
      const stage=stageAtAge(a);
      if(stage)total+=annualCost(c,stage.id);
      if(c.shiokuri&&a>=18&&a<22)total+=SHIOKURI_MONTHLY*12;
      if(a<18)total+=c.monthly*12;
    }
    return total;

  const tTotal=children.reduce((s,c)=>s+calcTotal(c),0);

function YearlyPlan({children}){
  if(!children.length)return <div style={{textAlign:"center",padding:32,color:"#a8a29e"}}>お子さまを追加すると表示されます</div>;
  const thisYear=new Date().getFullYear();
  const youngestAge=Math.min(...children.map(c=>getAge(c.birthYear)));
  const endYear=thisYear+Math.max(22-youngestAge,0);
  const years=Array.from({length:endYear-thisYear+1},(_,i)=>thisYear+i);
  const ENTRY={3:"幼稚園",6:"小学校",12:"中学",15:"高校",18:"大学"};
  const childTarget=c=>uniTotal(c)+(c.shiokuri?SHIOKURI_MONTHLY*12*4:0);
  const childFv=c=>fv(c.saved,c.monthly,c.rate,Math.max(18-getAge(c.birthYear),0));

  const rows=years.map(yr=>{
    const offset=yr-thisYear;
    let schoolSum=0;
    let monthlyTotal=0;
    const detail=children.map(c=>{
      const age=getAge(c.birthYear)+offset;
      const stage=stageAtAge(age);
      const schoolAnnual=stage?annualCost(c,stage.id):0;
      const shiokuriAnnual=c.shiokuri&&age>=18&&age<22?SHIOKURI_MONTHLY*12:0;
      schoolSum+=schoolAnnual+shiokuriAnnual;
      if(age<18)monthlyTotal+=c.monthly;
      const entryLabel=ENTRY[age]||null;
      // 大学入学年：実際に必要な準備金と貯蓄予測
      const yearsUntil18=Math.max(18-getAge(c.birthYear),0);
      const uniCheck=age===18?{
        isEntry:true,
        target:childTarget(c),
        proj:fv(c.saved,c.monthly,c.rate,yearsUntil18)
      }:null;
      return{name:c.name,age,stage,schoolAnnual,shiokuriAnnual,entryLabel,uniCheck,color:c.color,childSel:c.sel,childMonthly:c.monthly,childSaved:c.saved,childRate:c.rate};
    });
    return{yr,detail,schoolSum,monthlyTotal};
  });


  const thS={padding:"9px 8px",fontSize:11,fontWeight:700,color:"#78716c",borderBottom:"2px solid #e5e0d8",textAlign:"right",whiteSpace:"nowrap",background:"#fafaf8"};
  const tdS={padding:"10px 8px",fontSize:13,textAlign:"right",borderBottom:"1px solid #f0ece6",whiteSpace:"nowrap",verticalAlign:"middle"};

  // ピーク年TOP3を抽出
  const peakYears=[...rows].filter(r=>r.schoolSum>0).sort((a,b)=>b.schoolSum-a.schoolSum).slice(0,3);

  return(
    <div style={{display:"grid",gap:12}}>
      {peakYears.length>0&&(
        <div style={{background:"#fef2f2",borderRadius:14,padding:"14px 16px",border:"1px solid #fecaca"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#b91c1c",marginBottom:10,letterSpacing:".05em"}}>📌 家計のピーク年 TOP3</div>
          <div style={{display:"grid",gap:6}}>
            {peakYears.map((r,i)=>{
              const ages=r.detail.filter(d=>d.schoolAnnual>0||d.shiokuriAnnual>0).map(d=>{
                const sl=d.stage?.label||"";
                return `${d.name}${d.age>=0?d.age+"歳":"妊娠中"}・${sl}`;
              }).join(" ／ ");
              return(
                <div key={r.yr} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"8px 0",borderTop:i>0?"1px solid #fecaca":"none"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:800,color:"#1c1917"}}>{i+1}位　{r.yr}年</div>
                    <div style={{fontSize:11,color:"#78716c",marginTop:2,lineHeight:1.4}}>{ages}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:18,fontWeight:800,color:"#dc2626",lineHeight:1.1}}>{man(r.schoolSum)}円</div>
                    <div style={{fontSize:10,color:"#a8a29e"}}>年間</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
            <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",borderRadius:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",background:"white"}}>
          <thead>
            <tr>
              <th style={{...thS,textAlign:"left"}}>年</th>
              {children.map(c=>(
                <th key={c.id} style={{...thS,textAlign:"center",color:c.color,borderLeft:"1px solid #e5e0d8"}}>{c.name}</th>
              ))}
              <th style={{...thS,borderLeft:"2px solid #e5e0d8",color:"#dc2626",fontSize:13}}>年の合計</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r=>{
              const isNow=r.yr===thisYear;
              const hasEntry=r.detail.some(d=>d.entryLabel);
              return(
                <tr key={r.yr} style={{background:isNow?"#eff6ff":hasEntry?"#fffbeb":"white"}}>
                  <td style={{...tdS,textAlign:"left",fontWeight:isNow?800:hasEntry?700:400,color:isNow?"#1e3a5f":hasEntry?"#92400e":"#1c1917",minWidth:52}}>
                    {r.yr}
                    {isNow&&<span style={{fontSize:9,background:"#1e3a5f",color:"white",borderRadius:2,padding:"1px 7px",marginLeft:4}}>今年</span>}
                  </td>
                  {r.detail.map(d=>(
                    <td key={d.name} style={{...tdS,textAlign:"center",borderLeft:"1px solid #e5e0d8",padding:"10px 6px"}}>
                      {/* 年齢・学校 */}
                      <div style={{fontSize:11,color:"#a8a29e",marginBottom:d.entryLabel||d.schoolAnnual>0||d.shiokuriAnnual>0?4:0}}>
                        {d.age<0?"妊娠中":d.age+"歳"}{d.age>=0&&d.stage?" · "+d.stage.label:""}
                      </div>
                      {/* 入学年バッジ */}
                      {d.entryLabel&&(()=>{
                        // 入学費用の目安（万円）：入学金・受験料・初年度納付金。大学は日本政策金融公庫「教育費負担の実態調査」、他は文科省学習費調査・実勢を参考
                        const ENTRY_COSTS={
                          "幼稚園":{pub:3, pri:15},
                          "小学校":{pub:10,pri:50},
                          "中学":  {pub:8, pri:50},
                          "高校":  {pub:10,pri:40},
                          "大学":  {pub:30,liberal:105,science:115,pri:105}
                        };
                        const stageId=d.stage?.id;
                        const cost=ENTRY_COSTS[d.entryLabel];
                        let guide=null;
                        if(cost){
                          if(stageId==="uni"){
                            const uS=d.childSel?.uni;
                            guide=uS==="pub"?cost.pub:(uS==="liberal"?cost.liberal:(uS==="science"?cost.science:cost.pri));
                          } else {
                            guide=d.childSel?.[stageId]==="pri"?cost.pri:cost.pub;
                          }
                        }
                        return(
                          <div style={{marginBottom:5}}>
                            <div style={{fontSize:11,fontWeight:800,color:"#92400e",background:"#fdf6ec",borderRadius:2,padding:"2px 10px",display:"inline-block",borderLeft:"2px solid #c75827"}}>
                              {d.entryLabel}入学
                            </div>
                            {guide!==null&&(
                              <div style={{fontSize:10,color:"#92400e",marginTop:2}}>
                                ＋入学費用 約{guide}万円
                              </div>
                            )}
                          </div>
                        );
                      })()}
                      {/* 年間学費 */}
                      {d.schoolAnnual>0&&(
                        <div style={{fontWeight:800,color:"#1e3a5f",fontSize:14,marginBottom:d.shiokuriAnnual>0?2:0}}>
                          {man(d.schoolAnnual)}円
                          <span style={{fontSize:9,fontWeight:400,color:"#93c5fd",marginLeft:3}}>/ 年</span>
                        </div>
                      )}
                      {/* 仕送り */}
                      {d.shiokuriAnnual>0&&(
                        <div style={{fontSize:11,color:"#c75827",fontWeight:600}}>
                          仕送り {man(d.shiokuriAnnual)}円
                        </div>
                      )}
                      {/* 積立バッジ（大学在学中） */}
                      {d.uniCheck&&(()=>{
                        const ok=d.uniCheck.proj>=d.uniCheck.target;
                        const shortage=Math.max(0,d.uniCheck.target-d.uniCheck.proj);
                        if(d.uniCheck.isEntry){
                          return(
                            <div style={{marginTop:4,fontSize:11,fontWeight:700,color:"white",background:ok?"#16a34a":"#dc2626",borderRadius:6,padding:"5px 10px",lineHeight:1.4}}>
                              {ok?"✅ 準備OK":`準備不足 約${man(shortage)}円`}
                              <div style={{fontSize:9,fontWeight:400,opacity:0.9,marginTop:2}}>
                                目標{man(d.uniCheck.target)}／予測{man(d.uniCheck.proj)}円
                              </div>
                            </div>
                          );
                        } else {
                          return(
                            <div style={{marginTop:4,fontSize:10,fontWeight:700,color:ok?"#15803d":"#b91c1c",background:ok?"#f0fdf4":"#fef2f2",borderRadius:6,padding:"4px 10px",borderLeft:`2px solid ${ok?"#16a34a":"#dc2626"}`}}>
                              {ok?"✅ 準備OK":"準備不足"}
                            </div>
                          );
                        }
                      })()}

                    </td>
                  ))}
                  <td style={{...tdS,borderLeft:"2px solid #e5e0d8",fontWeight:800,fontSize:14,color:r.schoolSum>0?"#a83a2c":"#a8a29e"}}>
                    {r.schoolSum>0?man(r.schoolSum)+"円":"—"}
                    {r.schoolSum>0&&(()=>{
                      const schoolMonthly=r.schoolSum/12;
                      const schoolManDisplay=(Math.round(schoolMonthly/1000)/10).toFixed(1);
                      const tsekiMan=r.monthlyTotal>0?(Math.round(r.monthlyTotal/1000)/10).toFixed(1):null;
                      return(
                        <div style={{marginTop:3}}>
                          <div style={{fontSize:11,fontWeight:400,color:"#a8a29e"}}>授業料等 月{schoolManDisplay}万円</div>
                          {tsekiMan&&<div style={{fontSize:11,fontWeight:700,color:"#5d3954",marginTop:1}}>＋積立 {tsekiMan}万円/月</div>}
                        </div>
                      );
                    })()}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}
